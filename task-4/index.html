<?php

/* ======================
   Database Connection
====================== */
$conn = mysqli_connect("localhost","root","","ecommerce");

if(!$conn){
    die("Connection Failed: " . mysqli_connect_error());
}


/* ======================
   JOIN QUERY – Order History
====================== */
$orderQuery = "
SELECT 
    c.name AS customer,
    p.product_name,
    o.quantity,
    p.price,
    (o.quantity * p.price) AS total_amount,
    o.order_date
FROM Orders o
JOIN Customers c ON o.customer_id = c.customer_id
JOIN Products p ON o.product_id = p.product_id
ORDER BY o.order_date DESC
";

$orderResult = mysqli_query($conn, $orderQuery);


/* ======================
   Subquery – Highest Value Order
====================== */
$highestQuery = "
SELECT c.name, (o.quantity * p.price) AS total_amount
FROM Orders o
JOIN Customers c ON o.customer_id = c.customer_id
JOIN Products p ON o.product_id = p.product_id
WHERE (o.quantity * p.price) = (
    SELECT MAX(o2.quantity * p2.price)
    FROM Orders o2
    JOIN Products p2 ON o2.product_id = p2.product_id
)";
$highestResult = mysqli_query($conn, $highestQuery);
$highest = mysqli_fetch_assoc($highestResult);


/* ======================
   Subquery – Most Active Customer
====================== */
$activeQuery = "
SELECT name FROM Customers
WHERE customer_id = (
    SELECT customer_id
    FROM Orders
    GROUP BY customer_id
    ORDER BY COUNT(order_id) DESC
    LIMIT 1
)";
$activeResult = mysqli_query($conn, $activeQuery);
$active = mysqli_fetch_assoc($activeResult);

?>
